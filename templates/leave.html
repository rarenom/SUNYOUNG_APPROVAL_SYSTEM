<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
연차 / 반차 신청
</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

padding:15px;

font-family:"맑은 고딕", sans-serif;

background:#f5f7fb;

}



.container{

width:100%;

max-width:500px;

margin:20px auto;

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 3px 10px rgba(0,0,0,0.1);

}



h1{

text-align:center;

font-size:24px;

margin-bottom:15px;

}



.user-info{

text-align:center;

background:#eef2ff;

padding:10px;

border-radius:10px;

margin-bottom:20px;

font-weight:bold;

}



label{

display:block;

font-size:17px;

font-weight:bold;

margin-top:15px;

margin-bottom:8px;

}



input,
select,
textarea{

width:100%;

padding:14px;

font-size:17px;

border:1px solid #ccc;

border-radius:10px;

}



textarea{

height:120px;

resize:none;

}



button{

width:100%;

height:60px;

margin-top:20px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

font-size:18px;

font-weight:bold;

}



.back{

background:#64748b;

}



a{

text-decoration:none;

}



</style>


</head>



<body>


<div class="container">



<h1>
📝 연차 / 반차 신청
</h1>



<div class="user-info">

신청자 : {{ name }}

<br>

권한 : {{ role }}

</div>





<form method="post">



<label>
신청 종류
</label>


<select name="leave_type">


<option value="연차">
연차
</option>


<option value="반차">
반차
</option>


</select>





<label>
사용 날짜
</label>


<input

type="date"

name="leave_date"

required>





<label>
반차 구분
</label>


<select name="half_type">


<option value="">
선택 안함
</option>


<option value="오전">
오전 반차
</option>


<option value="오후">
오후 반차
</option>


</select>






<label>
신청 사유
</label>


<textarea

name="reason"

placeholder="신청 사유 입력"

required></textarea>







<button type="submit">

신청하기

</button>



</form>






<a href="/main">

<button class="back">

메인으로

</button>

</a>



</div>



</body>

</html>
