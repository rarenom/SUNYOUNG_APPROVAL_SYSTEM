<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>공지 수정</title>

<style>

body{
    font-family:"맑은 고딕";
    background:#f5f7fb;
}

.box{

    width:90%;
    max-width:600px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:15px;

}


input,
textarea{

    width:100%;
    padding:12px;
    margin-bottom:15px;
    box-sizing:border-box;

}


textarea{

    height:150px;

}


button{

    width:100%;
    height:50px;
    background:#2563eb;
    color:white;
    border:0;
    border-radius:10px;
    font-size:17px;
    font-weight:bold;

}


</style>

</head>


<body>


<div class="box">


<h2>
📢 공지사항 수정
</h2>


<form method="post">


<input
name="title"
value="{{notice[1]}}"
required
>


<textarea
name="content"
>{{notice[2]}}</textarea>



<label>

<input
type="checkbox"
name="important"
value="1"
{% if notice[4] == 1 %}checked{% endif %}
>

중요 공지

</label>


<br><br>


<button type="submit">

수정 저장

</button>


</form>


<br>


<a href="/notice_manage">

공지 목록으로

</a>


</div>


</body>

</html>
