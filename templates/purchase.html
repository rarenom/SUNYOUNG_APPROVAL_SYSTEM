<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
구매 요청
</title>


<style>


*{

box-sizing:border-box;

}



body{

margin:0;

padding:15px;

font-family:"맑은 고딕", sans-serif;

background:#f5f7fb;

}



.container{

width:100%;

max-width:500px;

margin:auto;

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 3px 10px rgba(0,0,0,0.1);

}



h1{

text-align:center;

font-size:25px;

margin-bottom:25px;

}



label{

display:block;

font-size:17px;

font-weight:bold;

margin-top:15px;

margin-bottom:8px;

}



input,

textarea{


width:100%;

padding:14px;

font-size:17px;

border:1px solid #ccc;

border-radius:10px;

}



textarea{

height:120px;

resize:none;

}



button{

width:100%;

height:60px;

margin-top:25px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

font-size:18px;

font-weight:bold;

}



.back{

background:#64748b;

}



a{

text-decoration:none;

}




@media(max-width:600px){


body{

padding:10px;

}



.container{

padding:20px;

}



h1{

font-size:22px;

}



input,

textarea{

font-size:16px;

}



button{

height:58px;

font-size:17px;

}



}



</style>


</head>



<body>



<div class="container">


<h1>

📦 구매 요청

</h1>




<form method="post">





<label>

품목

</label>


<input

type="text"

name="item"

placeholder="구매 품목 입력"

required>





<label>

수량

</label>


<input

type="number"

name="quantity"

placeholder="수량 입력"

required>






<label>

구매 사유

</label>


<textarea

name="reason"

placeholder="구매 사유 입력"

required></textarea>





<button type="submit">

구매 요청

</button>



</form>





<a href="/main">


<button class="back">

메인으로

</button>


</a>




</div>



</body>


</html>
