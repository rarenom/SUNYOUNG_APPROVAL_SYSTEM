<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
공지사항 관리
</title>


<style>

body{

font-family:"맑은 고딕";

background:#f5f7fb;

}


.box{

width:90%;

max-width:600px;

margin:30px auto;

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 3px 10px rgba(0,0,0,0.1);

}


input,textarea{

width:100%;

padding:12px;

margin-bottom:10px;

border-radius:10px;

border:1px solid #ddd;

font-size:16px;

}


textarea{

height:120px;

}


button{

width:100%;

height:50px;

background:#9333ea;

color:white;

border:none;

border-radius:10px;

font-size:17px;

font-weight:bold;

}


.notice{

margin-top:20px;

padding:15px;

border-radius:12px;

background:#f1f5f9;

}


</style>


</head>


<body>


<div class="box">


<h2>
📢 공지사항 등록
</h2>



<form method="post">


<input 
name="title"
placeholder="공지 제목"
required>


<textarea
name="content"
placeholder="공지 내용">
</textarea>



<label>

<input 
type="checkbox"
name="important"
value="1">

중요 공지

</label>


<br><br>


<button>
공지 등록
</button>


</form>





<h2>
등록된 공지
</h2>



{% for notice in notices %}

<div class="notice">

<b>

{{notice[1]}}

</b>

<br>


{{notice[2]}}


<br>


작성자 :
{{notice[3]}}


</div>


{% endfor %}



</div>


</body>

</html>
