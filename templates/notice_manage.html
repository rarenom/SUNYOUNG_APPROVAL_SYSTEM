<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
공지사항 관리
</title>


<style>

body{

font-family:"맑은 고딕";

background:#f5f7fb;

}


.box{

width:90%;

max-width:600px;

margin:30px auto;

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 3px 10px rgba(0,0,0,0.1);

}


input,
textarea{

width:100%;

padding:12px;

margin-bottom:10px;

border-radius:10px;

border:1px solid #ddd;

font-size:16px;

box-sizing:border-box;

}


textarea{

height:120px;

}



.checkbox_area{

display:flex;

align-items:center;

gap:8px;

margin:10px 0 20px 0;

}


.checkbox_area input{

width:20px;

height:20px;

margin:0;

}



button{

width:100%;

height:50px;

background:#9333ea;

color:white;

border:none;

border-radius:10px;

font-size:17px;

font-weight:bold;

cursor:pointer;

}



.btn_area{

display:flex;

gap:10px;

margin-top:10px;

}



.btn_area button{

width:50%;

}



.exit_btn{

background:#64748b;

}



.notice{

margin-top:20px;

padding:15px;

border-radius:12px;

background:#f1f5f9;

}



.notice_title{

font-size:18px;

font-weight:bold;

}


.notice_manage{

margin-top:15px;

display:flex;

gap:10px;

}



.edit_btn{

background:#2563eb;

height:40px;

font-size:14px;

}



.delete_btn{

background:#dc2626;

height:40px;

font-size:14px;

}



.important{

color:#dc2626;

font-weight:bold;

}



</style>


</head>


<body>


<div class="box">


<h2>
📢 공지사항 등록
</h2>



<form method="post">


<input 
name="title"
placeholder="공지 제목"
required>



<textarea
name="content"
placeholder="공지 내용"></textarea>




<div class="checkbox_area">


<input 
type="checkbox"
name="important"
value="1"
id="important">


<label for="important">

중요 공지

</label>


</div>



<div class="btn_area">


<button type="submit">

공지 등록

</button>



<a href="/main" style="width:50%;">

<button 
type="button"
class="exit_btn">

나가기

</button>

</a>


</div>



</form>






<h2>
등록된 공지
</h2>




{% for notice in notices %}



<div class="notice">


<div class="notice_title">


{% if notice[4] == 1 %}

<span class="important">
⭐ 중요
</span>

{% endif %}


{{notice[1]}}


</div>



<br>



{{notice[2]}}



<br><br>


작성자 :
{{notice[3]}}



<br>


등록일 :
{{notice[5]}}




<div class="notice_manage">


<a href="/notice_edit/{{notice[0]}}" style="width:50%;">

<button 
type="button"
class="edit_btn">

수정

</button>

</a>



<a 
href="/notice_delete/{{notice[0]}}"
onclick="return confirm('공지사항을 삭제하시겠습니까?');"
style="width:50%;">

<button 
type="button"
class="delete_btn">

삭제

</button>

</a>



</div>



</div>



{% endfor %}



</div>


</body>

</html>
