<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>직원 수정</title>


<style>

body{

    font-family: "맑은 고딕";

    width:500px;

    margin:50px auto;

    background:#f5f7fb;

}


.box{

    background:white;

    padding:30px;

    border-radius:10px;

    box-shadow:0 0 10px #ccc;

}



h2{

    text-align:center;

}



label{

    font-weight:bold;

}



input, select{

    width:100%;

    padding:10px;

    margin-top:5px;

    box-sizing:border-box;

}



.radio-box{

    margin-top:10px;

    padding:10px;

    background:#f1f5f9;

    border-radius:5px;

}



.radio-box input{

    width:auto;

}



button{

    width:100%;

    padding:12px;

    background:#2563eb;

    color:white;

    border:0;

    border-radius:5px;

    font-size:16px;

    cursor:pointer;

}


button:hover{

    background:#1d4ed8;

}


</style>


</head>


<body>


<div class="box">


<h2>
직원 수정
</h2>



<form method="post">



<label>
아이디
</label>

<input type="text"
name="user_id"
value="{{ user[1] }}">



<br><br>



<label>
비밀번호
</label>

<input type="text"
name="password"
value="{{ user[2] }}">



<br><br>



<label>
이름
</label>

<input type="text"
name="name"
value="{{ user[3] }}">



<br><br>



<label>
권한
</label>


<select name="role">


<option value="직원"
{% if user[4]=="직원" %}selected{% endif %}>
직원
</option>


<option value="공장장"
{% if user[4]=="공장장" %}selected{% endif %}>
공장장
</option>


<option value="담당자"
{% if user[4]=="담당자" %}selected{% endif %}>
담당자
</option>


<option value="대표"
{% if user[4]=="대표" %}selected{% endif %}>
대표
</option>


</select>



<br><br>


<label>
공장장 승인
</label>


<div class="radio-box">


<input type="radio"
name="factory_approval"
value="1"

{% if user[5]==1 %}checked{% endif %}
>

필요


&nbsp;&nbsp;


<input type="radio"
name="factory_approval"
value="0"

{% if user[5]==0 %}checked{% endif %}
>

생략


</div>



<br>



<label>
담당자 승인
</label>


<div class="radio-box">


<input type="radio"
name="manager_approval"
value="1"

{% if user[6]==1 %}checked{% endif %}
>

필요


&nbsp;&nbsp;


<input type="radio"
name="manager_approval"
value="0"

{% if user[6]==0 %}checked{% endif %}
>

생략


</div>



<br><br>



<button type="submit">

저장

</button>



</form>



</div>


</body>


</html>
