<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>직원 수정</title>
<style>
body{
    font-family: 맑은 고딕;
    width:500px;
    margin:50px auto;
}

input, select{
width:100%;
padding:8px;
box-sizing:border-box;
}

button{
padding:10px 20px;
cursor:pointer;
} </style>

</head>
<body>

<h2>직원 수정</h2>

<form method="post">

<label>아이디</label><br> <input type="text" value="{{ user[1] }}" readonly><br><br>

<label>비밀번호</label><br> <input type="text" name="password" value="{{ user[2] }}"><br><br>

<label>이름</label><br> <input type="text" name="name" value="{{ user[3] }}"><br><br>

<label>권한</label><br> <select name="role">
<option value="직원" {% if user[4]=='직원' %}selected{% endif %}>직원</option>
<option value="공장장" {% if user[4]=='공장장' %}selected{% endif %}>공장장</option>
<option value="담당자" {% if user[4]=='담당자' %}selected{% endif %}>담당자</option>
<option value="대표" {% if user[4]=='대표' %}selected{% endif %}>대표</option> </select>

<br><br>

<button type="submit">저장</button>

</form>

</body>
</html>
