<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SUNYOUNG 전자결재 SYSTEM</title>

<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;
    padding:0;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#f5f7fb;

    font-family:"맑은 고딕", sans-serif;

}


/* 로그인 카드 */

.login-box{

    width:90%;
    max-width:420px;

    background:white;

    padding:40px 35px;

    border-radius:20px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.12);

}


/* 제목 */

.logo{

    text-align:center;

    margin-bottom:30px;

}


.logo h1{

    margin:0;

    font-size:28px;

    color:#0f172a;

}


.logo p{

    margin-top:10px;

    color:#64748b;

    font-size:16px;

}



/* 입력 */

label{

    display:block;

    margin-bottom:6px;

    font-weight:bold;

    color:#334155;

}


input{

    width:100%;

    height:50px;

    border:1px solid #cbd5e1;

    border-radius:10px;

    padding:0 15px;

    font-size:16px;

    margin-bottom:20px;

}



input:focus{

    outline:none;

    border-color:#2563eb;

}



/* 버튼 */

button{

    width:100%;

    height:55px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}


button:hover{

    background:#1d4ed8;

}



/* 하단 */

.footer{

    margin-top:30px;

    text-align:center;

    color:#94a3b8;

    font-size:13px;

}


</style>


</head>


<body>


<div class="login-box">


<div class="logo">

<h1>
SUNYOUNG
</h1>

<p>
전자결재 SYSTEM
</p>

</div>



<form method="post">


<label>
아이디
</label>

<input 
type="text"
name="user_id"
placeholder="아이디 입력">



<label>
비밀번호
</label>


<input
type="password"
name="password"
placeholder="비밀번호 입력">



<button type="submit">

로그인

</button>


</form>



<div class="footer">

SUNYOUNG APPROVAL SYSTEM

</div>


</div>


</body>

</html>
